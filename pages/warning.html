<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ShadowShield — Dangerous page blocked</title>
<style>
  :root{
    --abyss:#0A1420; --hull:#12202F; --rope:#24394D;
    --chart:#E8EEF4; --fog:#8FA5B9; --brass:#C9973F;
    --rocks:#F2565F; --rocks-dim:#38161C;
    --display:"Iowan Old Style",Georgia,"Palatino Linotype",Palatino,serif;
    /* Aliases so the existing rules below resolve against the new palette */
    --ink:var(--abyss); --panel:var(--hull); --line:var(--rope);
    --text:var(--chart); --muted:var(--fog);
    --danger:var(--rocks); --danger-dim:var(--rocks-dim);
  }
  *{box-sizing:border-box;margin:0}
  body{
    background:var(--ink); color:var(--text); min-height:100vh;
    display:grid; place-items:center; padding:24px;
    font:15px/1.6 -apple-system,"Segoe UI",Roboto,Ubuntu,sans-serif;
  }
  .card{max-width:640px;width:100%;background:var(--panel);border:1px solid var(--line);
    border-top:4px solid var(--danger);border-radius:12px;padding:36px;
    box-shadow:0 0 60px rgba(242,86,95,.14);animation:alert 2.4s ease-in-out infinite}
  @keyframes alert{0%,100%{box-shadow:0 0 40px rgba(242,86,95,.10)}50%{box-shadow:0 0 80px rgba(242,86,95,.20)}}
  @media (prefers-reduced-motion: reduce){.card{animation:none}}
  .badge{display:inline-block;background:var(--danger-dim);color:var(--danger);
    border:1px solid var(--danger);border-radius:999px;padding:3px 12px;
    font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
  h1{font:600 30px/1.15 var(--display);margin:14px 0 8px;letter-spacing:.005em}
  .sub{color:var(--muted)}
  .domain{
    font:600 18px/1.4 ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace;
    background:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:14px 16px;margin:22px 0;word-break:break-all;
  }
  .domain b{color:var(--danger);text-decoration:underline dotted}
  .score{float:right;color:var(--danger);font-weight:700}
  ul{list-style:none;margin:0 0 26px}
  li{padding:9px 0 9px 26px;border-bottom:1px solid var(--line);color:var(--muted);position:relative}
  li::before{content:"×";position:absolute;left:4px;color:var(--danger);font-weight:700}
  li:last-child{border-bottom:none}
  .actions{display:flex;gap:12px;flex-wrap:wrap}
  button{font:inherit;border-radius:8px;padding:12px 20px;cursor:pointer;border:1px solid transparent}
  #back{background:var(--text);color:var(--ink);font-weight:600;flex:1}
  #back:focus-visible,#proceed:focus-visible{outline:2px solid var(--text);outline-offset:2px}
  #proceed{background:none;color:var(--muted);border-color:var(--line)}
  #proceed:hover{color:var(--danger);border-color:var(--danger)}
</style>
</head>
<body>
  <main class="card">
    <span class="badge">Blocked by ShadowShield</span>
    <h1>This page is dangerous to visit</h1>
    <p class="sub">This address matches a confirmed scam, phishing, or malware source. Entering any details here — or downloading anything — could hand control straight to an attacker.</p>
    <div class="domain"><span class="score" id="score"></span><span id="domain"></span></div>
    <ul id="signals"></ul>
    <div class="actions">
      <button id="back">Take me to safety</button>
      <button id="proceed">Proceed anyway (not recommended)</button>
    </div>
  </main>
  <script src="warning.js"></script>
</body>
</html>
